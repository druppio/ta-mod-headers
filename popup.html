<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Header Editor</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header class="app-header">
      <div class="logo">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 6h16M4 12h16M4 18h7"/>
          <path d="M15 15l6 6M21 15l-6 6"/>
        </svg>
        Header Editor
      </div>
      <span class="version">v1.0</span>
    </header>

    <div class="profile-bar">
      <select id="profileSelect" class="profile-select"></select>
      <button id="renameProfileBtn" class="icon-btn" title="Rename profile">✎</button>
      <button id="addProfileBtn" class="icon-btn" title="New profile">+</button>
      <button id="deleteProfileBtn" class="icon-btn danger" title="Delete profile">×</button>
      <label class="toggle-switch" title="Enable/disable profile">
        <input type="checkbox" id="profileEnabled">
        <span class="slider"></span>
      </label>
    </div>

    <div class="url-filter-section">
      <label class="section-label" for="urlFilter">URL Filter</label>
      <input type="text" id="urlFilter" placeholder="||example.com  (empty = all URLs)" class="url-input">
    </div>

    <div class="headers-section">
      <div class="section-header">
        <span class="section-label">Request Headers</span>
        <button id="addRequestHeader" class="add-btn">+ Add</button>
      </div>
      <div id="requestHeadersList" class="headers-list"></div>
    </div>

    <div class="headers-section">
      <div class="section-header">
        <span class="section-label">Response Headers</span>
        <button id="addResponseHeader" class="add-btn">+ Add</button>
      </div>
      <div id="responseHeadersList" class="headers-list"></div>
    </div>

    <div class="footer">
      <button id="exportBtn" class="text-btn">Export</button>
      <button id="importBtn" class="text-btn">Import</button>
      <input type="file" id="importFile" accept=".json" style="display:none">
      <span id="statusMsg" class="status-msg"></span>
    </div>
  </div>

  <!-- Request header name suggestions (ordered by common dev usage) -->
  <datalist id="requestHeaderSuggestions">
    <option value="Authorization">
    <option value="Content-Type">
    <option value="Accept">
    <option value="Origin">
    <option value="Referer">
    <option value="User-Agent">
    <option value="Cookie">
    <option value="X-Api-Key">
    <option value="X-Auth-Token">
    <option value="X-Requested-With">
    <option value="X-CSRF-Token">
    <option value="X-Forwarded-For">
    <option value="X-Real-IP">
    <option value="X-Correlation-ID">
    <option value="X-Request-ID">
    <option value="X-Client-ID">
    <option value="Accept-Language">
    <option value="Accept-Encoding">
    <option value="Cache-Control">
    <option value="Pragma">
    <option value="If-None-Match">
    <option value="If-Modified-Since">
    <option value="Range">
    <option value="Host">
    <option value="Connection">
    <option value="Content-Length">
    <option value="Content-Encoding">
    <option value="Sec-Fetch-Mode">
    <option value="Sec-Fetch-Site">
    <option value="Sec-Fetch-Dest">
    <option value="DNT">
  </datalist>

  <!-- Response header name suggestions (ordered by common dev usage) -->
  <datalist id="responseHeaderSuggestions">
    <option value="Access-Control-Allow-Origin">
    <option value="Access-Control-Allow-Methods">
    <option value="Access-Control-Allow-Headers">
    <option value="Access-Control-Allow-Credentials">
    <option value="Access-Control-Expose-Headers">
    <option value="Access-Control-Max-Age">
    <option value="Content-Type">
    <option value="Content-Security-Policy">
    <option value="Content-Security-Policy-Report-Only">
    <option value="Referrer-Policy">
    <option value="X-Frame-Options">
    <option value="X-Content-Type-Options">
    <option value="Strict-Transport-Security">
    <option value="Permissions-Policy">
    <option value="Cache-Control">
    <option value="X-XSS-Protection">
    <option value="Set-Cookie">
    <option value="Location">
    <option value="WWW-Authenticate">
    <option value="ETag">
    <option value="Last-Modified">
    <option value="Vary">
    <option value="Content-Encoding">
    <option value="Content-Length">
    <option value="Server">
    <option value="X-Powered-By">
  </datalist>

  <script src="popup.js"></script>
</body>
</html>
