<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Simple Header Editor</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header class="app-header">
      <div class="logo">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 6h16M4 12h16M4 18h7"/>
          <path d="M15 15l6 6M21 15l-6 6"/>
        </svg>
        Simple Header Editor
      </div>
      <div class="header-right">
        <button id="themeToggle" class="theme-btn" title="Theme: System">◑</button>
        <span class="version">v1.0</span>
      </div>
    </header>

    <div class="profile-bar">
      <select id="profileSelect" class="profile-select"></select>
      <button id="renameProfileBtn" class="icon-btn" title="Rename profile">✎</button>
      <button id="addProfileBtn" class="icon-btn" title="New profile">+</button>
      <button id="deleteProfileBtn" class="icon-btn danger" title="Delete profile">×</button>
      <label class="toggle-switch" title="Enable/disable profile">
        <input type="checkbox" id="profileEnabled">
        <span class="slider"></span>
      </label>
    </div>

    <div class="url-filter-section">
      <label class="section-label" for="urlFilter">URL Filter</label>
      <input type="text" id="urlFilter" placeholder="||example.com  (empty = all URLs)" class="url-input">
    </div>

    <div class="headers-section">
      <div class="section-header">
        <span class="section-label">Request Headers</span>
        <button id="addRequestHeader" class="add-btn">+ Add</button>
      </div>
      <div id="requestHeadersList" class="headers-list"></div>
    </div>

    <div class="headers-section">
      <div class="section-header">
        <span class="section-label">Response Headers</span>
        <button id="addResponseHeader" class="add-btn">+ Add</button>
      </div>
      <div id="responseHeadersList" class="headers-list"></div>
    </div>

    <div class="footer">
      <button id="exportBtn" class="text-btn">Export</button>
      <button id="importBtn" class="text-btn">Import</button>
      <input type="file" id="importFile" accept=".json" style="display:none">
      <span id="statusMsg" class="status-msg"></span>
    </div>
  </div>

  <div id="headerAutocomplete" class="autocomplete-dropdown hidden"></div>

  <script src="popup.js"></script>
</body>
</html>
