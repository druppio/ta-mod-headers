name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.2.0). Defaults to version in manifest.json.'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release tag
        id: ver
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          elif [[ -n "${{ inputs.tag }}" ]]; then
            echo "tag=${{ inputs.tag }}" >> $GITHUB_OUTPUT
          else
            MANIFEST_VER=$(jq -r '.version' manifest.json)
            echo "tag=v${MANIFEST_VER}" >> $GITHUB_OUTPUT
          fi

      - name: Build extension zip
        run: |
          mkdir -p dist
          ZIP="dist/simple-header-editor-${{ steps.ver.outputs.tag }}.zip"
          zip -r "$ZIP" \
            manifest.json \
            background.js \
            popup.html \
            popup.js \
            popup.css \
            icons/
          echo "zip=$ZIP" >> $GITHUB_ENV
          echo "Built: $(du -sh $ZIP | cut -f1) — $(unzip -l $ZIP | tail -1)"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: Simple Header Editor ${{ steps.ver.outputs.tag }}
          generate_release_notes: true
          files: ${{ env.zip }}
          body: |
            ## Install

            1. Download **`simple-header-editor-${{ steps.ver.outputs.tag }}.zip`** from Assets below
            2. Unzip it to a permanent folder (don't delete after loading)
            3. Open Chrome → `chrome://extensions`
            4. Enable **Developer mode** (top-right toggle)
            5. Click **Load unpacked** → select the unzipped folder

            See the [README](https://github.com/${{ github.repository }}/blob/main/README.md) for full usage instructions.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
